# .fossa.yml — FOSSA CLI configuration for rurl
# Schema: https://github.com/fossas/fossa-cli/blob/master/docs/references/files/fossa-yml.md
#
# SCOPE OF THIS FILE
#   .fossa.yml controls WHAT gets scanned (project identity + path/target
#   filtering). It does NOT — and cannot — encode license allow/deny or
#   per-issue "ignore" rules. Those live in a FOSSA *Policy*, which is a PAID
#   feature not available on this account. So there is intentionally no
#   `project.policy` binding here. The flagged findings are all benign for an
#   MIT project (see .fossa/POLICY.md for the per-dependency rationale); the
#   chosen disposition is to keep FOSSA INFORMATIONAL — i.e. not a required
#   status check that blocks deploys — rather than to suppress findings.
#   The path excludes below still apply when the FOSSA CLI is run; the hosted
#   GitHub-App integration may ignore this file entirely.
version: 3

project:
  id: git+github.com/bart-turczynski/rurl
  name: rurl

paths:
  exclude:
    # Rendered pkgdown site: bundles third-party web assets (Bootstrap, jQuery,
    # Font Awesome's SIL-OFL font + CC-BY icons) that raise license findings
    # unrelated to the package. Generated output, never distributed as source.
    - docs
    # R CMD check scratch output — build artifacts, never distributed.
    - '**/*.Rcheck'
    # testthat snapshots / fixtures — not shipped to users.
    - tests/testthat/_snaps
