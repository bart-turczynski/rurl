# Full cross-platform R CMD check matrix. Deliberately NOT on every PR: runs on
# merges to main, on PRs touching compiled/build files, weekly, and on demand.
# Fast per-PR feedback (lint + one Ubuntu check) lives in verify.yml.
name: Full platform check

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'src/**'
      - 'configure'
      - 'configure.win'
      - 'cleanup'
      - '**/Makevars'
      - '**/Makevars.*'
      - 'DESCRIPTION'
      - '.github/workflows/full-check.yml'
  schedule:
    - cron: '41 5 * * 1'
  workflow_dispatch:

permissions: read-all

concurrency:
  group: full-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check
      - uses: r-lib/actions/check-r-package@v2
        with:
          # The strict CRAN-grade pass: --as-cran across every platform. This is
          # what CRAN itself runs, so it is the gate before a release.
          args: 'c("--no-manual", "--as-cran")'
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
