# Fast verification gate: lint + a single Ubuntu R CMD check + coverage, on
# every push to main and every PR. Full cross-platform coverage lives in
# full-check.yml. Named "R-CMD-check" so tooling that discovers CI by the
# conventional workflow name (e.g. pkgcheck's `cmd|coverage` heuristic) sees it.
name: R-CMD-check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions: read-all

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      LINTR_ERROR_ON_LINT: true
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::lintr
      - name: Lint
        run: lintr::lint_package()
        shell: Rscript {0}

  readme:
    runs-on: ubuntu-latest
    name: README in sync with README.Rmd
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # devtools::build_readme() installs the package and re-renders
          # README.Rmd (its code chunks are static, but build_readme still
          # builds + installs the package before rendering).
          extra-packages: any::devtools
          needs: check
      - name: Re-render README.md from README.Rmd
        run: devtools::build_readme()
        shell: Rscript {0}
      - name: Fail if README.md is out of date
        run: |
          if ! git diff --exit-code -- README.md; then
            echo "::error file=README.md::README.md is out of sync with README.Rmd. Run devtools::build_readme() and commit the result."
            exit 1
          fi

  check:
    needs: lint
    runs-on: ubuntu-latest
    name: R CMD check (ubuntu-latest, release)
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check
      - uses: r-lib/actions/check-r-package@v2
        with:
          # Fast gate runs a standard check; the strict --as-cran pass lives in
          # full-check.yml (and the local pre-push hook).
          args: '"--no-manual"'
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'

  # The locale-invariance gate (RURL-izzuenjx). rurl's output must not depend
  # on the session's LC_CTYPE -- same input, same values AND same Encoding()
  # marks -- so the suite has to actually RUN under a non-UTF-8 charset
  # somewhere. It lives here rather than in full-check.yml because it is a
  # one-job Linux cell (no matrix multiplier) guarding a class of defect that
  # is cheap to reintroduce on any parse-path PR: the fast gate is where it
  # earns its keep. It is deliberately NOT the determinism probe, which
  # collects evidence across OS x R x charset and never fails a build.
  locale:
    needs: lint
    runs-on: ubuntu-latest
    name: Tests (LC_ALL=C)
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::testthat, any::pkgload
          needs: check

      # LC_ALL is set per-step, not job-wide, so dependency installation runs
      # in the runner's normal environment and only the probed session is
      # forced to C. It is exported before R is exec'd (never via a mid-session
      # Sys.setlocale()): ICU, which stringi and therefore rurl's case folding
      # sit on, picks its default locale at initialization, so a late switch
      # can leave a cell looking green while probing the wrong charset.
      - name: Assert the C locale actually took effect
        env:
          LC_ALL: C
          LANG: C
        shell: Rscript {0}
        run: |
          ctype <- Sys.getlocale("LC_CTYPE")
          utf8 <- isTRUE(l10n_info()[["UTF-8"]])
          cat("LC_CTYPE:      ", ctype, "\n", sep = "")
          cat("l10n_info UTF-8:", utf8, "\n", sep = " ")
          # A silently-UTF-8 cell is a gate that proves nothing, so the
          # requested charset is asserted rather than assumed. "C" always
          # exists on a Linux runner -- nothing needs generating -- so a
          # mismatch here means the environment did not reach R at all.
          if (!identical(ctype, "C") || utf8) {
            stop("requested LC_CTYPE=C but got '", ctype,
                 "' (UTF-8 = ", utf8, ")")
          }

      # testthat::test_local() fails the step on any test FAILURE
      # (stop_on_failure). Warnings are reported but tolerated on purpose:
      # under LC_ALL=C, pslr's own bundled_snapshot() emits "strings not
      # representable in native encoding will be translated to UTF-8". That is
      # UPSTREAM (PSLR-jzdhhugc) and rurl cannot fix it, so this cell must not
      # be written to fail on it.
      - name: Run the test suite under LC_ALL=C
        env:
          LC_ALL: C
          LANG: C
        shell: Rscript {0}
        run: |
          stopifnot(identical(Sys.getlocale("LC_CTYPE"), "C"))
          testthat::test_local(reporter = "summary", stop_on_failure = TRUE)

  coverage:
    needs: check
    runs-on: ubuntu-latest
    name: Test coverage
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr, any::xml2
          needs: coverage
      - name: Measure coverage
        run: |
          cov <- covr::package_coverage(quiet = FALSE)
          covr::to_cobertura(cov)
        shell: Rscript {0}
      - uses: codecov/codecov-action@v5
        with:
          files: ./cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}
