# --- Fresh-clone restore drill; exercised and asserted by G0.4 (RURL-zyksymya).
restore_instructions: |
  Reconstruct baseline authority from a fresh clone, without local memory.
  NOTE: registers/snapshots.log is written by the seal PR *after* the tag, so it
  lives on main (a descendant of C1), not at the tag commit. Read the log from
  the default branch; do not check out the tag to read it.

    1. Clone the repository (default branch = main, which carries the sealed
       snapshots.log and this manifest):
         git clone <repo-url> rurl && cd rurl
    2. Read the snapshot binding (authority is the log line, not the movable
       ref) and verify the tag resolves to that exact commit:
         line=$(grep -E '^1[[:space:]]' design/work/url-v3/registers/snapshots.log)
         sha=$(echo "$line" | awk '{print $3}')
         test "$(git rev-parse v3/cp-snapshot-1^{commit})" = "$sha"
    3. Verify the 11 frozen review sources:
         (cd design/work/url-v3/evidence && shasum -a 256 -c SHA256SUMS.txt)
       expect 11 x OK.
    4. Verify the manifest schema + referential integrity + every recorded hash:
         Rscript design/work/url-v3/tools/validate-manifest.R \
                 design/work/url-v3/manifest.yaml
       expect "VALIDATION PASSED".
    5. The reviews' analysis baseline is source_baseline (89be90b); the
       durability anchor is control_plane_snapshot (v3/cp-snapshot-1). These are
       distinct commits and must never be conflated.

